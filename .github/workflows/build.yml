name: Build Brusher

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'

      - name: Clean CMake Cache (Unix)
        if: runner.os != 'Windows'
        run: rm -rf build/

      - name: Clean CMake Cache (Windows)
        if: runner.os == 'Windows'
        run: powershell -Command "if (Test-Path build) { Remove-Item -Recurse -Force build }"

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Install Dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cpack

      - name: Package (Ubuntu)
        if: runner.os == 'Linux'
        working-directory: build
        run: cpack -G DEB

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Brusher-${{ matrix.os }}
          path: |
            build/Brusher
            build/*.deb