name: Build Brusher

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Qt (Ubuntu)
        if: runner.os == 'Linux'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          cache: true
          modules: 'qtbase qttools qtsvg qtwayland'

      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          cache: true

      - name: Install Qt (macOS)
        if: runner.os == 'macOS'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          cache: true

      - name: Clean CMake Cache (Unix)
        if: runner.os != 'Windows'
        run: rm -rf build/

      - name: Clean CMake Cache (Windows)
        if: runner.os == 'Windows'
        run: powershell -Command "if (Test-Path build) { Remove-Item -Recurse -Force build }"

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package (Ubuntu)
        if: runner.os == 'Linux'
        working-directory: build
        run: cpack -G DEB

      - name: Upload Artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Brusher-${{ matrix.os }}
          path: build/Brusher.exe

      - name: Upload Artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Brusher-${{ matrix.os }}
          path: build/Brusher

      - name: Upload Artifacts (Ubuntu)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: Brusher-${{ matrix.os }}
          path: |
            build/Brusher
            build/*.deb